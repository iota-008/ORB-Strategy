<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a"/>
  
  <!-- Grid lines -->
  <line x1="10" y1="75" x2="90" y2="75" stroke="#333" stroke-width="1"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#333" stroke-width="1"/>
  
  <!-- Candlestick 1 (Red/Bearish) -->
  <line x1="25" y1="35" x2="25" y2="70" stroke="#ef5350" stroke-width="2"/>
  <rect x="20" y="50" width="10" height="15" fill="#ef5350"/>
  
  <!-- Candlestick 2 (Green/Bullish) -->
  <line x1="45" y1="40" x2="45" y2="75" stroke="#66bb6a" stroke-width="2"/>
  <rect x="40" y="45" width="10" height="20" fill="#66bb6a"/>
  
  <!-- Candlestick 3 (Green/Bullish) -->
  <line x1="65" y1="30" x2="65" y2="72" stroke="#66bb6a" stroke-width="2"/>
  <rect x="60" y="35" width="10" height="25" fill="#66bb6a"/>
  
  <!-- Candlestick 4 (Blue/Neutral) -->
  <line x1="85" y1="45" x2="85" y2="75" stroke="#42a5f5" stroke-width="2"/>
  <rect x="80" y="55" width="10" height="10" fill="#42a5f5"/>
  
  <!-- Uptrend arrow (subtle) -->
  <polyline points="15,80 18,77 20,79" stroke="#66bb6a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>